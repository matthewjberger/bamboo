<header class="mb-10 pb-8 border-b border-gray-200 dark:border-gray-700">
    <h1 class="text-4xl md:text-5xl font-bold text-gray-900 dark:text-white mb-4">{{ post.title }}</h1>
    <div class="flex items-center gap-3 text-gray-500 dark:text-gray-400 flex-wrap">
        <div class="flex items-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
            </svg>
            <time datetime="{{ post.date }}">{{ post.date | date(format="%B %d, %Y") }}</time>
        </div>
        {% if site.config.author %}
        <span class="text-gray-300 dark:text-gray-600" aria-hidden="true">&middot;</span>
        <div class="flex items-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
            </svg>
            <span>{{ site.config.author }}</span>
        </div>
        {% endif %}
        {% if post.reading_time > 0 %}
        <span class="text-gray-300 dark:text-gray-600" aria-hidden="true">&middot;</span>
        <div class="flex items-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <span>{{ post.reading_time }} min read</span>
        </div>
        {% endif %}
    </div>
    {% if post.tags | length > 0 %}
    <div class="flex flex-wrap gap-2 mt-4">
        {% for tag in post.tags %}
        <a href="{{ site.config.base_url }}/tags/{{ tag | slugify }}/" class="px-3 py-1 bg-blue-50 dark:bg-blue-500/10 text-blue-600 dark:text-blue-400 rounded-full text-sm font-medium border border-blue-100 dark:border-blue-500/20 hover:bg-blue-100 dark:hover:bg-blue-500/20 transition-colors">{{ tag }}</a>
        {% endfor %}
    </div>
    {% endif %}
</header>
